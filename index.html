<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirelimMi? — Yönlendiriliyor</title>
    <link rel="icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="src/js/config.js"></script>
    <script src="src/js/util.js"></script>
    <script src="src/js/firebase-init.js"></script>
</head>
<body>
    <div class="auth-wrap">
        <div style="text-align:center;color:var(--gri)">
            <img src="assets/img/logo.png" alt="GirelimMi?" style="height:64px"><br>
            <i class="fa-solid"></i> Yönlendiriliyorsunuz...
        </div>
    </div>
    <script>
        if (!FB_READY) {
            location.replace("login.html");
        } else {
            auth.onAuthStateChanged((user) => {
                location.replace(user ? "dashboard.html" : "login.html");
            });
        }
    </script>
</body>
</html>
