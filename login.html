<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — GirelimMi?</title>
    <link rel="icon" href="assets/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="src/js/config.js"></script>
    <script src="src/js/util.js"></script>
    <script src="src/js/firebase-init.js"></script>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <img src="assets/img/logo.png" alt="GirelimMi?" class="auth-logo">

            <h1 class="auth-title">Giriş Yap</h1>
            <p class="auth-sub">Hesabına giriş yapmak için e-posta veya kullanıcı adın ile şifreni gir.</p>

            <form id="login-form" onsubmit="event.preventDefault(); handleLogin();">
                <div class="field">
                    <label>E-posta veya kullanıcı adı</label>
                    <input type="text" id="email" placeholder="ornek@domain.com veya kullaniciadi" autocomplete="username" required>
                </div>
                <div class="field">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div style="text-align:right;margin-bottom:8px;">
                    <button type="button" class="link-btn" onclick="handlePasswordReset()">Şifremi unuttum</button>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="login-btn">Giriş Yap <i class="fa-solid fa-bolt"></i></button>
                <div class="form-msg" id="msg"></div>
            </form>

            <div class="auth-foot">
                Hesabın yok mu? <a href="kayit_ol.html">Kayıt ol</a>
            </div>
        </div>
    </div>
    <script src="src/js/auth.js"></script>
    <script>
        // Zaten giriş yapmışsa dashboard'a gönder
        if (FB_READY) auth.onAuthStateChanged((u) => { if (u) location.replace("dashboard.html"); });
    </script>
</body>
</html>
